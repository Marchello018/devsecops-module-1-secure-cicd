name: Secure CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: secure-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python-version:
          - "3.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest app/test_main.py -q

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install scan dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Bandit
        run: bandit -r app -x app/test_main.py -q

      - name: Run dependency audit
        run: pip-audit -r app/requirements.txt

  package:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - test
      - scan
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Build Docker image
        run: docker build --tag secure-fastapi:${{ github.sha }} .

  deploy:
    name: Protected Deploy
    runs-on: ubuntu-latest
    needs:
      - package
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Deployment placeholder
        run: echo "Deployment approved for production."
